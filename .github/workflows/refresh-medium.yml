name: Refresh Medium Posts
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Fetch Medium RSS
        run: node -e "
          const Parser = require('rss-parser');
          const fs = require('fs');
          const parser = new Parser();
          (async () => {
            const feed = await parser.parseURL('https://medium.com/feed/@nathankling_49918');
            const posts = feed.items.map(i => ({
              title: i.title,
              date: i.isoDate || i.pubDate,
              url: i.link,
              excerpt: (i.contentSnippet || '').slice(0, 200)
            }));
            fs.writeFileSync('_data/medium.json', JSON.stringify(posts, null, 2));
            console.log('Wrote', posts.length, 'posts');
          })();
        "

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/medium.json
          git diff --cached --quiet || (git commit -m "auto: refresh Medium posts" && git push)
